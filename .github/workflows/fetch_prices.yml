name: Fetch TBH Market Prices

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分に実行（日本時間 +9h）
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write           # data/prices.json をコミットするため

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create data directory
        run: mkdir -p data

      - name: Fetch market prices
        run: python scripts/fetch_prices.py

      - name: Commit updated prices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(TZ='Asia/Tokyo' date '+%Y-%m-%d %H:%M JST')
            git commit -m "chore: update market prices ${TIMESTAMP}"
            git push
          fi
